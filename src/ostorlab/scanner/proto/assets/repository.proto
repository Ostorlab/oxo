syntax = "proto2";

package ostorlab.scanner.proto.assets.repository;

message Message {
  enum Provider {
    GITHUB = 1;
    GITLAB = 2;
    AZURE = 3;
    BITBUCKET = 4;
    STANDARDGIT = 5;
  }
  optional string repository_url = 1;
  optional string commit_hash = 2;
  optional Provider provider = 3;
}
