syntax = "proto2";

import "ostorlab/scanner/proto/assets/file.proto";
import "ostorlab/scanner/proto/assets/android_store.proto";
import "ostorlab/scanner/proto/assets/ios_store.proto";
import "ostorlab/scanner/proto/assets/harmonyos_store.proto";
import "ostorlab/scanner/proto/assets/apk.proto";
import "ostorlab/scanner/proto/assets/aab.proto";
import "ostorlab/scanner/proto/assets/ipa.proto";
import "ostorlab/scanner/proto/assets/harmonyos_hap.proto";
import "ostorlab/scanner/proto/assets/harmonyos_apk.proto";
import "ostorlab/scanner/proto/assets/harmonyos_aab.proto";
import "ostorlab/scanner/proto/assets/harmonyos_app.proto";
import "ostorlab/scanner/proto/assets/harmonyos_rpk.proto";
import "ostorlab/scanner/proto/assets/api_schema.proto";
import "ostorlab/scanner/proto/assets/repository.proto";
import "ostorlab/scanner/proto/assets/repository_archive.proto";
import "ostorlab/scanner/proto/assets/link.proto";
import "ostorlab/scanner/proto/assets/network.proto";
import "ostorlab/scanner/proto/assets/ip.proto";
import "ostorlab/scanner/proto/assets/v4.proto";
import "ostorlab/scanner/proto/assets/v6.proto";

package ostorlab.scanner.proto.assets.multi_asset;

message Message {
  repeated ostorlab.scanner.proto.assets.file.Message files = 1;
  oneof mobile_asset {
    ostorlab.scanner.proto.assets.android_store.Message android_package_name = 2;
    ostorlab.scanner.proto.assets.ios_store.Message ios_bundle_id = 3;
    ostorlab.scanner.proto.assets.harmonyos_store.Message harmonyos_bundle_name = 4;
    ostorlab.scanner.proto.assets.apk.Message android_apk = 5;
    ostorlab.scanner.proto.assets.aab.Message android_aab = 6;
    ostorlab.scanner.proto.assets.ipa.Message ios_ipa = 7;
    ostorlab.scanner.proto.assets.harmonyos_hap.Message harmonyos_hap = 8;
    ostorlab.scanner.proto.assets.harmonyos_apk.Message harmonyos_apk = 9;
    ostorlab.scanner.proto.assets.harmonyos_aab.Message harmonyos_aab = 10;
    ostorlab.scanner.proto.assets.harmonyos_app.Message harmonyos_app = 11;
    ostorlab.scanner.proto.assets.harmonyos_rpk.Message harmonyos_rpk = 12;
  }
  repeated ostorlab.scanner.proto.assets.repository.Message repositories = 13;
  repeated ostorlab.scanner.proto.assets.repository_archive.Message repository_archives = 14;
  repeated ostorlab.scanner.proto.assets.link.Message urls = 15;
  repeated ostorlab.scanner.proto.assets.network.Message networks = 16;
  repeated ostorlab.scanner.proto.assets.ip.Message ips = 17;
  repeated ostorlab.scanner.proto.assets.v4.Message ipv4s = 18;
  repeated ostorlab.scanner.proto.assets.v6.Message ipv6s = 19;
  repeated ostorlab.scanner.proto.assets.api_schema.Message api_schemas = 20;
}
