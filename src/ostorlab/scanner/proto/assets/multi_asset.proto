syntax = "proto2";

import "ostorlab/scanner/proto/assets/apk.proto";
import "ostorlab/scanner/proto/assets/ipa.proto";
import "ostorlab/scanner/proto/assets/aab.proto";
import "ostorlab/scanner/proto/assets/harmonyos_hap.proto";
import "ostorlab/scanner/proto/assets/harmonyos_apk.proto";
import "ostorlab/scanner/proto/assets/harmonyos_aab.proto";
import "ostorlab/scanner/proto/assets/harmonyos_rpk.proto";
import "ostorlab/scanner/proto/assets/harmonyos_app.proto";
import "ostorlab/scanner/proto/assets/domain_name.proto";
import "ostorlab/scanner/proto/assets/link.proto";
import "ostorlab/scanner/proto/assets/repository.proto";
import "ostorlab/scanner/proto/assets/repository_archive.proto";
import "ostorlab/scanner/proto/assets/source.proto";
import "ostorlab/scanner/proto/assets/file.proto";

package ostorlab.scanner.proto.assets.multi_asset;

// Composed asset holding several homogeneous asset lists so a single scan can
// target a mix of mobile packages, domains, links, repositories and files.
message Message {
  repeated ostorlab.scanner.proto.assets.apk.Message apk = 1;
  repeated ostorlab.scanner.proto.assets.ipa.Message ipa = 2;
  repeated ostorlab.scanner.proto.assets.aab.Message aab = 3;
  repeated ostorlab.scanner.proto.assets.harmonyos_hap.Message harmonyos_hap = 4;
  repeated ostorlab.scanner.proto.assets.harmonyos_apk.Message harmonyos_apk = 5;
  repeated ostorlab.scanner.proto.assets.harmonyos_aab.Message harmonyos_aab = 6;
  repeated ostorlab.scanner.proto.assets.harmonyos_rpk.Message harmonyos_rpk = 7;
  repeated ostorlab.scanner.proto.assets.harmonyos_app.Message harmonyos_app = 8;
  repeated ostorlab.scanner.proto.assets.domain_name.Message domain_name = 9;
  repeated ostorlab.scanner.proto.assets.link.Message link = 10;
  repeated ostorlab.scanner.proto.assets.repository.Message repository = 11;
  repeated ostorlab.scanner.proto.assets.repository_archive.Message repository_archive = 12;
  repeated ostorlab.scanner.proto.assets.source.Message source = 13;
  repeated ostorlab.scanner.proto.assets.file.Message file = 14;
}
