syntax = "proto2";

import "ostorlab/agent/message/proto/v3/asset/file/file.proto";
import "ostorlab/agent/message/proto/v3/asset/file/android/apk/apk.proto";
import "ostorlab/agent/message/proto/v3/asset/file/android/aab/aab.proto";
import "ostorlab/agent/message/proto/v3/asset/file/ios/ipa/ipa.proto";
import "ostorlab/agent/message/proto/v3/asset/repository/repository.proto";
import "ostorlab/agent/message/proto/v3/asset/file/repository_archive/repository_archive.proto";
import "ostorlab/agent/message/proto/v3/asset/link/link.proto";
import "ostorlab/agent/message/proto/v3/asset/ip/ip.proto";
import "ostorlab/agent/message/proto/v3/asset/ip/v4/v4.proto";
import "ostorlab/agent/message/proto/v3/asset/ip/v6/v6.proto";

package ostorlab.agent.message.proto.v3.asset.asset_group;

message Message {
  repeated ostorlab.agent.message.proto.v3.asset.file.Message files = 1;
  repeated ostorlab.agent.message.proto.v3.asset.file.android.apk.Message android_apk = 4;
  repeated ostorlab.agent.message.proto.v3.asset.file.android.aab.Message android_aab = 5;
  repeated ostorlab.agent.message.proto.v3.asset.file.ios.ipa.Message ios_ipa = 6;
  repeated ostorlab.agent.message.proto.v3.asset.repository.Message repositories = 7;
  repeated ostorlab.agent.message.proto.v3.asset.file.repository_archive.Message repository_archives = 8;
  repeated ostorlab.agent.message.proto.v3.asset.link.Message urls = 9;
  repeated ostorlab.agent.message.proto.v3.asset.ip.Message ips = 10;
  repeated ostorlab.agent.message.proto.v3.asset.ip.v4.Message ipv4s = 11;
  repeated ostorlab.agent.message.proto.v3.asset.ip.v6.Message ipv6s = 12;
}
