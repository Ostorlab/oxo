    ostorlab.agent.message.proto.v3.asset.file.harmonyos.hap.Message harmonyos_hap = 21;
    ostorlab.agent.message.proto.v3.asset.file.harmonyos.app.Message harmonyos_app = 22;
    ostorlab.agent.message.proto.v3.asset.file.harmonyos.rpk.Message harmonyos_rpk = 23;
    ostorlab.agent.message.proto.v3.asset.multi_asset.Message multi_asset = 24;
  }
  required string description = 11;
  required string rating = 12;
}
